services:
  nopassword:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    environment:
      NO_PASSWORD_PORT: 9000
      NO_PASSWORD_PUBLIC_ORIGIN: ${NO_PASSWORD_PUBLIC_ORIGIN:-http://127.0.0.1:${NO_PASSWORD_HOST_PORT:-8080}}
      NO_PASSWORD_RP_ID: ${NO_PASSWORD_RP_ID:-127.0.0.1}
      NO_PASSWORD_DATA_DIR: ${NO_PASSWORD_DATA_DIR:-/app/data}
      NO_PASSWORD_WEB_DIST: /app/web
      NO_PASSWORD_CADDY_SITE: ${NO_PASSWORD_CADDY_SITE:-http://:8080}
      NO_PASSWORD_CADDY_ADMIN_ADDRESS: 127.0.0.1:2019
      NO_PASSWORD_CADDY_CONFIG_PATH: /app/data/caddy/managed.Caddyfile
      NO_PASSWORD_CADDY_BIN: /usr/bin/caddy
    volumes:
      - nopassword-data:/app/data
    ports:
      - "${NO_PASSWORD_HOST_PORT:-8080}:8080"
      - "${NO_PASSWORD_HTTPS_HOST_PORT:-8443}:8443"
volumes:
  nopassword-data:
