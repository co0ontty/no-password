services:
  nopassword:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    environment:
      NO_PASSWORD_PORT: ${NO_PASSWORD_PORT:-8080}
      NO_PASSWORD_PUBLIC_ORIGIN: ${NO_PASSWORD_PUBLIC_ORIGIN:-http://127.0.0.1:8080}
      NO_PASSWORD_RP_ID: ${NO_PASSWORD_RP_ID:-127.0.0.1}
      NO_PASSWORD_DATA_DIR: ${NO_PASSWORD_DATA_DIR:-/app/data}
      NO_PASSWORD_WEB_DIST: /app/web
    volumes:
      - nopassword-data:/app/data
    ports:
      - "${NO_PASSWORD_PORT:-8080}:8080"

  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    depends_on:
      - nopassword
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  nopassword-data:
  caddy-data:
  caddy-config:

